_base_: ../base.yaml
experiment_name: yolo11_parts_seg_v1

model:
  name: yolo11_seg
  stage: parts
  weights: yolo11n-seg.pt

data:
  yaml_path: data/y11_kaggle_yolo/parts/dataset.yaml
  image_size: 640

training:
  epochs: 100
  batch_size: 16
  optimizer:
    lr: 0.01

  # NEW: Everything in this block gets passed directly to YOLO11 natively!
  yolo_kwargs:
    optimizer: SGD
    momentum: 0.9
    weight_decay: 0.0005
    patience: 5
    cos_lr: true
    mosaic: 1.0     # Example of tuning augmentation

output:
  runs_dir: runs/parts_yolo11
