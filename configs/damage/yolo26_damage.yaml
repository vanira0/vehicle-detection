_base_: ../base.yaml

experiment_name: yolo26_damage_seg_v1

model:
  name: yolo26_seg
  stage: damage
  weights: yolo26s-seg.pt

data:
  yaml_path: rf_ds_damage_v-1/data.yaml
  image_size: 1024
  # class_names: ['dent', 'scratch', 'crack', 'glass shatter', 'lamp broken', 'tire flat']
  class_names: ['dent', 'scratch', 'broken']

training:
  epochs: 100
  batch_size: 16
  optimizer:
    lr: 0.001
  yolo_kwargs:
    optimizer: SGD
    momentum: 0.937
    weight_decay: 0.001
    patience: 20
  #   cos_lr: true
  #   mosaic: 1.0
  #   copy_paste: 0.0

output:
  runs_dir: runs/damage_yolo26_rb_vik
