_base_: ../base.yaml

experiment_name: yolo26_damage_seg_v1

model:
  name: yolo26_seg
  stage: damage
  weights: yolo26s-seg.pt

data:
  yaml_path: data/kaggle/data.yaml
  image_size: 640
  class_names: ['dent', 'scratch', 'crack', 'glass shatter', 'lamp broken', 'tire flat']

training:
  epochs: 50
  batch_size: 16
  optimizer:
    lr: 0.01
  # yolo_kwargs:
  #   optimizer: SGD
  #   momentum: 0.937
  #   weight_decay: 0.0005
  #   patience: 5
  #   cos_lr: true
  #   mosaic: 1.0
  #   copy_paste: 0.0

output:
  runs_dir: runs/damage_yolo26
