# =============================================================================
# Damage Localization — Mask R-CNN with ResNet50-FPN backbone
# =============================================================================
# Stage 2: Instance segmentation of damage types.
# Baseline strategy using torchvision's pretrained Mask R-CNN.
# Set 2: Add damage and part labels to the dataset
# =============================================================================

_base_: ../base.yaml
experiment_name: damage_maskrcnn_resnet50_v1

model:
  name: maskrcnn_resnet50
  stage: damage
  num_classes: 4                  # bg + 4 part classes (using damage_kr-1 dataset for now)
  backbone: resnet50
  pretrained: true
  fpn: true
  trainable_backbone_layers: 3     # Fine-tune top 3 layers of backbone
  min_size: 512
  max_size: 800

data:
  root: damage_kr-1
  annotation_format: coco
  image_size: 512
  class_names: ["background", "broken", "dent", "scratch"]

training:
  epochs: 50
  batch_size: 2
  gradient_clip_norm: 1.0
  early_stopping:
    enabled: true
    patience: 5
    metric: loss
    mode: min
  optimizer:
    name: sgd
    lr: 0.001
    momentum: 0.9
    weight_decay: 0.0005
  scheduler:
    name: step
    step_size: 10
    gamma: 0.1
