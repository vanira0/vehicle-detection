# =============================================================================
# Vehicle Damage Detection — Base Configuration
# =============================================================================
# All experiment configs inherit from this file via `_base_: ../base.yaml`.
# Override any field in your experiment config to customize behavior.
# CLI overrides: --set training.optimizer.lr=0.001 training.epochs=30
# =============================================================================

project_name: vehicle-damage-detection
seed: 42

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  root: data/processed
  annotations_dir: data/annotations
  annotation_format: coco          # coco | folder (for classification)
  image_size: 1024                 # Resize longest edge
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  num_workers: 0
  pin_memory: false

# ---------------------------------------------------------------------------
# Augmentation (Albumentations)
# ---------------------------------------------------------------------------
augmentation:
  horizontal_flip: 0.5
  vertical_flip: 0.0
  rotation_limit: 15
  random_scale:
    min: 0.8
    max: 1.2
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
  gaussian_blur:
    prob: 0.1
    blur_limit: 3
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
training:
  epochs: 50
  batch_size: 4
  optimizer:
    name: sgd                      # sgd | adam | adamw
    lr: 0.005
    momentum: 0.9
    weight_decay: 0.0005
  scheduler:
    name: step                     # step | cosine | onecycle | plateau
    step_size: 3
    gamma: 0.1
  amp: true                        # Automatic mixed precision
  gradient_accumulation: 1
  gradient_clip_norm: null          # Set to e.g. 1.0 to enable gradient clipping
  early_stopping:
    enabled: true
    patience: 10
    metric: mAP_50_95
    mode: max                      # max | min
  checkpoint:
    save_every: 5                  # Save every N epochs
    save_best: true
    metric: mAP_50_95
    mode: max

# ---------------------------------------------------------------------------
# Evaluation
# ---------------------------------------------------------------------------
evaluation:
  iou_thresholds: [0.5, 0.75]
  confidence_threshold: 0.5
  nms_threshold: 0.5
  per_class: true

# ---------------------------------------------------------------------------
# Inference
# ---------------------------------------------------------------------------
inference:
  iou_threshold: 0.3              # Overlap threshold for damage-to-part mapping
  confidence_threshold: 0.5
  device: null                     # null = auto-detect (cuda if available)

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: INFO
  log_every_n_steps: 10
  tensorboard: true
  wandb: false
  csv: true

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output:
  runs_dir: runs
