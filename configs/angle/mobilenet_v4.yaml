# =============================================================================
# Angle Detection — MobileNetV4 Classifier
# =============================================================================
# Stage: Determines the orientation/angle of a vehicle in an image.
# Multi-class classification: right, left, front, rear, front-right, 
# front-left, rear-right, rear-left
# =============================================================================

_base_: ../base.yaml
experiment_name: angle_mobilenet_v4_v1

model:
  name: mobilenet_v4_angle_classifier
  stage: angle
  num_classes: 8                   # right, left, front, rear, etc.
  backbone: mobilenet_v4
  pretrained: true
  dropout: 0.5
  freeze_backbone_epochs: 5        # Freeze backbone for first N epochs

data:
  root: rf_ds_angle-2
  annotation_format: folder        # Folder-based: right/ left/ front/ etc.
  image_size: 224
  class_names: [
    "front", "front-left", "front-right", "left", 
    "rear", "rear-left", "rear-right", "right"
  ]

training:
  epochs: 30
  batch_size: 16
  optimizer:
    name: adam
    lr: 0.001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    T_max: 30
    eta_min: 0.00001
  checkpoint:
    metric: accuracy

output:
  runs_dir: runs/angle_mobilenet_v4
